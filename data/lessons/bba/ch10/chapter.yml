chapter: 10
course: bba
title: "Adjectives and Numbers"
focus: >
  Learn Aramaic adjective forms in all three states (absolute, determined,
  construct) for both genders and numbers, and practice adjective-noun agreement.
  Study the cardinal numbers 1–10 with their gender-polarity pattern (which
  mirrors Hebrew), the teens, and the tens. Note that Aramaic numbers appear
  most prominently in the chronological and administrative sections of Daniel
  and Ezra.
