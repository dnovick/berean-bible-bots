chapter: 17
course: bba
title: "Peal Participle"
focus: >
  Learn the Peal active and passive participle forms in all four
  gender-number combinations (ms, fs, mp, fp), noting their use as predicates
  of ongoing action and as attributive or substantival modifiers. In
  Biblical Aramaic the participle is especially common in narrative as a
  periphrastic construction with the copula (היה + participle) to express
  continuous action. This completes the Peal stem survey before moving to
  the derived stems.
