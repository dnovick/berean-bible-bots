chapter: 4
course: bbg
title: "Punctuation and Syllabification"
focus: >
  Learn Greek punctuation marks (period, comma, semicolon/question mark,
  high dot), the three accent types (acute, grave, circumflex), the rough and
  smooth breathings, and the rules for dividing words into syllables. Correct
  accentuation and syllabification support both pronunciation and the later
  recognition of accent-based distinctions (e.g., τίς vs. τις).
