chapter: 34
course: bbh
title: "Hithpael Strong"
focus: >
  Learn the Hithpael stem for strong verbs in all conjugations: perfect,
  imperfect, imperative, infinitives, and participle. Identify the diagnostic
  הִתְ- preformative and dagesh forte in the middle root consonant, and learn
  the metathesis rule (when the root begins with a sibilant, ת and the first
  consonant switch places) and the assimilation rules (when the root begins
  with certain consonants). Understand the Hithpael's primary reflexive and
  reciprocal functions.
