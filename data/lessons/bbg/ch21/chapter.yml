chapter: 21
course: bbg
title: "Imperfect Indicative"
focus: >
  Learn the imperfect active and middle/passive indicative paradigms: augment
  (syllabic or temporal) + present stem + connecting vowel + secondary
  endings. Understand that the imperfect combines imperfective aspect with
  past time reference, yielding ongoing or repeated past action. Contrast the
  imperfect with the aorist (Ch22–23) which carries perfective aspect in past
  time. Augment rules for compound verbs are introduced.
