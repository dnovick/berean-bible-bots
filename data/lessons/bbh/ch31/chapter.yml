chapter: 31
course: bbh
title: "Piel Weak"
focus: >
  Apply Piel stem patterns to weak root classes: II-guttural and II-resh roots
  (which cannot take dagesh forte and require virtual doubling or compensatory
  lengthening), III-ה roots, and geminate roots. Recognizing a Piel form when
  the diagnostic dagesh forte is absent due to a guttural second radical is a
  critical parsing skill that prevents confusion with Qal forms of the same root.
