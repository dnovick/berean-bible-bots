name: Slack — Issue Activity

on:
  issues:
    types: [opened, edited, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.event.sender.login }}
        run: |
          case "$ACTION" in
            opened)  EMOJI=":new:";              VERB="opened" ;;
            edited)  EMOJI=":pencil2:";          VERB="edited" ;;
            closed)  EMOJI=":white_check_mark:"; VERB="closed" ;;
          esac
          jq -n \
            --arg number "$ISSUE_NUMBER" \
            --arg title  "$ISSUE_TITLE" \
            --arg url    "$ISSUE_URL" \
            --arg emoji  "$EMOJI" \
            --arg verb   "$VERB" \
            --arg actor  "$ACTOR" \
            '{
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ($emoji + " *Issue #" + $number + " " + $verb + "*\n<" + $url + "|" + $title + ">")
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: (($verb | ascii_upcase[:1]) + $verb[1:] + " by *" + $actor + "*")
                    }
                  ]
                }
              ]
            }' \
          | curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data @-
