chapter: 32
course: bbh
title: "Pual Strong"
focus: >
  Learn the Pual stem for strong verbs—the passive of Piel—in all conjugations.
  Identify the diagnostic qibbuts vowel under the first root consonant (in the
  perfect) and dagesh forte in the middle consonant as the twin markers of Pual.
  Contrast the Pual with the Niphal passive and Hophal passive, and understand
  when Hebrew authors prefer Pual to express the passive of an intensive or
  factitive action.
