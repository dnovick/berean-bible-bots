chapter: 7
course: bbg
title: "Genitive and Dative"
focus: >
  Add the genitive and dative cases to the second-declension masculine and
  neuter paradigms and to the article. Learn the primary functions of the
  genitive (possession, description, partitive, separation) and the dative
  (indirect object, sphere, means, manner), and practice parsing all four cases
  in connected text. Completing the four main cases of the second declension
  equips students to read basic noun phrases in the GNT.
