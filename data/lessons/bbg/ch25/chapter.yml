chapter: 25
course: bbg
title: "Perfect Indicative"
focus: >
  Learn the perfect active and middle/passive indicative paradigms: reduplication
  + perfect stem + κα tense formative (active) or without κα (middle/passive) +
  endings. Understand that the perfect tense-form encodes stative aspect—a
  present state resulting from a past action—and distinguish it from the aorist
  (simple past occurrence). Key theological perfect forms (γέγραπται, πεπίστευκα)
  are introduced in context.
