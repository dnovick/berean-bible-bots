chapter: 6
course: bbh
title: "Hebrew Prepositions"
focus: >
  Learn the three inseparable prepositions and how they are pointed before
  normal consonants, before vowel letters, before the article, and before
  gutturals. Study the independent prepositions and their key functions in
  prepositional phrases. Prepositions recur in every translated passage and
  also attach pronominal suffixes (Ch9), so correct identification now is
  essential.
