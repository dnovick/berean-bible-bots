chapter: 1
course: bbh
title: "Hebrew Alphabet"
focus: >
  Master all 22 Hebrew consonants, the 5 sofit (final) forms, and the 6
  begadkephat letters with their hard (dagesh lene) and soft pronunciations.
  Learn to read right-to-left script and recognize the letter classes—gutturals,
  begadkephat, and sibilants—that govern spelling and pointing throughout the
  entire grammar.
