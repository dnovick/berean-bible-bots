chapter: 9
course: bba
title: "Pronouns"
focus: >
  Memorize the Aramaic independent personal pronouns (all persons, genders,
  and numbers), demonstrative pronouns (near and far), and the interrogative
  pronouns. Note the characteristic Aramaic forms such as הוּא and הִיא for
  the third person singular, and understand that pronouns in Aramaic serve the
  same grammatical functions as their Hebrew counterparts but with distinct
  forms that must be learned separately.
