chapter: 19
course: bba
title: "The Pael Stem"
focus: >
  Learn the Pael stem paradigms (perfect, imperfect, imperative, infinitive,
  and participle) for the strong verb, and identify the diagnostic dagesh
  forte in the middle root consonant as the Pael's signature marker—directly
  parallel to the Hebrew Piel (BBH Ch30). Understand the Pael's intensive,
  resultative, and factitive functions, and contrast it with the Peal for
  the same root where both occur in Daniel and Ezra.
