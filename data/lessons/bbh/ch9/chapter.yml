chapter: 9
course: bbh
title: "Hebrew Pronominal Suffixes"
focus: >
  Learn the Type 1 and Type 2 pronominal suffix paradigms and attach them to
  singular and plural nouns to express possession. Recognize how the linking
  vowels and noun endings change when a suffix is added, and understand that
  the suffixed noun is inherently definite. The same suffix set later attaches
  to prepositions and to verb forms (Ch19), making this one of the highest-yield
  paradigms in the course.
