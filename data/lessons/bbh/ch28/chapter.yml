chapter: 28
course: bbh
title: "Hophal Strong"
focus: >
  Learn the Hophal stem for strong verbs in all conjugations: perfect,
  imperfect, participle, and infinitives. Identify the diagnostic qamets-hatuph
  or qibbuts vowel under the הׁ- or מׁ- preformative that marks Hophal, and
  contrast it with the Hiphil preformative. Understand the Hophal as the passive
  of Hiphil—expressing the state of having been caused to perform an action—and
  recognize its relative rarity compared to the active Hiphil and the Niphal
  passive.
