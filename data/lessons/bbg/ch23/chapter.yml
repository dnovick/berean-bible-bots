chapter: 23
course: bbg
title: "First Aorist Active and Middle Indicative"
focus: >
  Learn the first aorist (weak aorist) active and middle indicative paradigms:
  augment + verbal stem + σα tense formative + secondary endings (with special
  1s and 3s forms). Study the consonantal changes that occur when σα is added
  to stems ending in stops, and learn liquid aorist stems that drop sigma
  and lengthen the preceding vowel. The first aorist is the most common aorist
  formation in the NT.
