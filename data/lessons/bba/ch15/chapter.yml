chapter: 15
course: bba
title: "Peal Imperative"
focus: >
  Learn the four Peal imperative forms (2ms, 2fs, 2mp, 2fp) derived from the
  imperfect by removing the preformative, along with the negative command
  constructions. Recognize the close morphological relationship between the
  imperative and the infinitive construct in Aramaic—both often share the
  same form—and use context to distinguish them. Imperatives are frequent in
  the royal-decree and divine-command sections of Daniel.
