chapter: 34
course: bbg
title: "Indicative of δίδωμι"
focus: >
  Learn the indicative paradigms of δίδωμι (to give), the model μι-verb,
  in the present, imperfect, aorist, and perfect—active, middle, and passive.
  Understand the reduplication and stem-vowel alternation (διδο-/δο-) that
  characterizes μι-verb conjugation, and contrast these forms with the
  thematic (ω-verb) patterns learned in Chs 15–25. δίδωμι itself occurs
  over 400 times in the NT.
