chapter: 30
course: bbg
title: "Combinative (Perfect) Participles and Genitive Absolutes"
focus: >
  Learn the perfect active (κοτ- stem) and perfect middle/passive (μεν- stem)
  participle paradigms, and understand that they encode stative aspect (a
  present state resulting from past action). Study the genitive absolute
  construction—a genitive-case participial phrase whose subject is not the
  subject of the main clause—and learn to identify and translate it as a
  subordinate temporal or causal clause.
