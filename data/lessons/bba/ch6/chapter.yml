chapter: 6
course: bba
title: "Nouns: Construct State"
focus: >
  Learn the Aramaic construct state endings for masculine and feminine nouns
  (singular and plural) and understand how the construct chain functions:
  the construct noun is bound to its genitive companion to express possession,
  material, or description. Note that Aramaic construct chains work identically
  to Hebrew (BBH Ch10) but with distinct endings, especially the masculine
  plural construct. The three-state noun system (absolute, determined,
  construct) is now complete.
