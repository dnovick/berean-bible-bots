chapter: 4
course: bbh
title: "Hebrew Nouns"
focus: >
  Learn the two genders (masculine and feminine), singular and plural number
  with their characteristic endings, and dual forms. Identify common irregular
  plurals and understand how vowels shift under inflectional stress, especially
  in segolate nouns. This chapter establishes the nominal paradigm that adjective
  agreement (Ch7) and the construct chain (Ch10) both depend on.
