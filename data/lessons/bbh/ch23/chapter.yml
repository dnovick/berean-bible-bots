chapter: 23
course: bbh
title: "Sentence Syntax"
focus: >
  Learn to analyze verbal and verbless clause structures, identify the subject,
  predicate, and object, and recognize the major clause types in Hebrew prose:
  narrative main clause (wayyiqtol), discourse clause, and subordinate clause.
  Study the function of the disjunctive waw, the Hebrew relative clause, and
  direct speech markers. This synthesis chapter integrates Chs 1–22 before
  the course moves into the derived verbal stems.
