chapter: 1
course: bbg
title: "The Greek Language"
focus: >
  Survey the history of Greek from classical through Koine and Byzantine forms,
  and understand why Koine Greek—the lingua franca of the first-century
  Mediterranean world—is the language of the New Testament. Learn the
  significance of Greek as the vehicle for apostolic proclamation, and gain
  motivation for the grammatical precision that exegesis requires.
