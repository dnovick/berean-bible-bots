chapter: 11
course: bbh
title: "Hebrew Numbers"
focus: >
  Learn the cardinal numbers 1–10 with their gender-polarity patterns,
  the teens, the tens, and the ordinals 1–10. Understand how numbers agree
  (or disagree) with their nouns and how they function in construct chains.
  Numbers appear in narrative, legal, and poetic texts throughout the Hebrew
  Bible and require recognition even when active production is not the focus.
