chapter: 13
course: bbh
title: "Qal Perfect Strong Verbs"
focus: >
  Learn all 13 Qal perfect strong-verb forms (3ms through 1cp), parsing by
  person, gender, and number (PGN). Identify the characteristic perfect
  affixes and the diagnostic vowel pattern (patah under the preformative-free
  stem). Understand the semantic range of the perfect aspect—completed action,
  stative—so that translation choices reflect Hebrew verbal aspect rather than
  defaulting to simple past.
