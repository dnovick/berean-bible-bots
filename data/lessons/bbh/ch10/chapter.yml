chapter: 10
course: bbh
title: "Hebrew Construct Chain"
focus: >
  Learn to identify construct and absolute noun forms, understand that the
  construct noun is always indefinite unless the absolute noun is definite, and
  practice the vowel and ending changes that signal construct state. Recognize
  multi-link chains and translate the relationship they encode (possession,
  material, description). The construct chain is ubiquitous in Hebrew prose
  and poetry and must be parsed confidently before tackling complex syntax.
