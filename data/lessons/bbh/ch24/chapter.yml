chapter: 24
course: bbh
title: "Niphal Strong"
focus: >
  Learn the Niphal stem in all finite and non-finite forms for the strong verb:
  perfect, imperfect, imperative, infinitives, and participle. Identify the
  diagnostic nun preformative (or assimilation with dagesh forte) in the perfect
  and infinitive construct, and the nun-plus-preformative pattern in the
  imperfect. Understand the Niphal's primary functions—passive of Qal,
  reflexive, and middle voice—and practice identifying them in exegetical
  context.
