chapter: 33
course: bbg
title: "Imperative"
focus: >
  Learn the present and aorist imperative paradigms (active and middle/passive)
  in second and third person. Understand the aspectual distinction: present
  imperative commands ongoing or repeated action; aorist imperative commands
  a simple act. Learn the negative imperative forms (μή + present imperative
  = stop; μή + aorist subjunctive = don't start) and the handful of irregular
  imperative forms that must be memorized (ἐλθέ, εἰπέ, etc.).
