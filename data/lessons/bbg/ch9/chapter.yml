chapter: 9
course: bbg
title: "Adjectives"
focus: >
  Learn the first- and second-declension adjective paradigms (2-1-2 pattern)
  in all four cases, both genders, and both numbers, and the matching article
  forms. Distinguish attributive position (article-adjective-noun or
  article-noun-article-adjective) from predicate position (no article on
  adjective), and substantival use (adjective alone with article). Adjective
  agreement in case, gender, and number is the foundation for participial
  and pronoun agreement in later chapters.
