chapter: 28
course: bbg
title: "Perfective (Aorist) Adverbial Participles"
focus: >
  Learn the aorist active (σαντ- / αντ- stem) and aorist passive (θεντ- stem)
  adverbial participle paradigms. Understand that the aorist adverbial participle
  typically depicts action antecedent to the main verb ("after having done"),
  contrasting with the present participle's simultaneous action (Ch27).
  Practice distinguishing first and second aorist participial forms and
  translating each adverbial category accurately.
