chapter: 24
course: bbg
title: "Aorist and Future Passive Indicative"
focus: >
  Learn the aorist passive indicative formed with augment + verbal stem + θη
  tense formative + secondary active endings, and the future passive formed
  with verbal stem + θησ + connecting vowel + primary middle endings.
  Recognize that Greek uses an active-voice ending set for the aorist passive
  (a diagnostic unique to this tense-form). Understand the passive voice
  theologically, especially the "divine passive" construction frequent in the
  Gospels.
