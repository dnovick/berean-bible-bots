chapter: 14
course: bba
title: "Peal Imperfect"
focus: >
  Learn the Peal imperfect paradigm with its preformatives and afformatives,
  and identify the characteristic imperfect vowel pattern for the strong verb.
  Understand the imperfect's aspectual range (incomplete, habitual, modal,
  future) as parallel to the Hebrew Qal imperfect (BBH Ch15). Note the Aramaic
  imperfect preformatives—which differ slightly from Hebrew—and begin
  recognizing them in Daniel 2–7 and Ezra 4–7.
