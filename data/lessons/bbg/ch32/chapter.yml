chapter: 32
course: bbg
title: "Infinitive"
focus: >
  Learn the present and aorist infinitive forms (active, middle, passive)
  and the perfect active infinitive. Study the primary uses of the Greek
  infinitive: complementary (completing another verb), indirect discourse,
  purpose (with τοῦ or εἰς τό), and subject of a clause. Recognize the
  articular infinitive with various prepositions (ἐν τῷ, πρὸ τοῦ, μετὰ τό)
  encoding temporal relationships, and the nominative subject of an infinitive
  in accusative case.
