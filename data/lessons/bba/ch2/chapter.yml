chapter: 2
course: bba
title: "Vowels"
focus: >
  Learn the Biblical Aramaic vowel system as represented in the Tiberian
  pointing used in the standard BHS/BHQ text, noting where Aramaic vowel
  classes overlap with Hebrew and where they diverge (e.g., the frequent
  use of seghol and patah in Aramaic nominal patterns). Recognize the
  reduced shewa vowels and understand how vowel reduction operates in
  Aramaic syllables—a skill needed for every inflected form in the course.
