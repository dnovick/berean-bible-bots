chapter: 36
course: bbg
title: "ἵστημι, τίθημι, δείκνυμι and Odds 'n Ends"
focus: >
  Learn the full paradigms of ἵστημι (to stand/set), τίθημι (to place), and
  δείκνυμι (to show), observing the reduplication and stem-vowel alternation
  unique to each. Survey remaining grammatical topics: the optative mood,
  the vocative case, additional pronoun types, and numerals. This capstone
  chapter rounds out the BBG grammar, equipping students to read any passage
  in the Greek New Testament with the aid of a lexicon.
