chapter: 18
course: bbg
title: "Present Middle/Passive Indicative"
focus: >
  Learn the present middle/passive indicative paradigm with its secondary
  middle endings, and understand that Greek uses the same form for both middle
  and passive in the present (and imperfect). Learn the basic distinctions
  between active, middle (subject acting for its own benefit or on itself),
  and passive voice. Deponent verbs—which are middle or passive in form but
  active in meaning—are introduced and must be learned as vocabulary.
