chapter: 12
course: bba
title: "Introduction to Aramaic Verbs"
focus: >
  Survey the Aramaic verbal system: the stem (binyan) system—Peal, Peil,
  Hithpeel, Pael, Hithpaal, Haphel, Aphel, and Hophal—and the conjugations
  (perfect, imperfect, imperative, infinitive, participle). Learn the 3ms Peal
  perfect as the lexical citation form and understand how Aramaic stems map
  onto the Hebrew Qal, Niphal, Piel, and Hiphil. This orientation chapter
  provides the framework for Chs 13–22.
