chapter: 16
course: bbh
title: "Qal Imperfect Weak Verbs"
focus: >
  Apply Qal imperfect preformative-and-afformative endings to the major weak
  classes: I-guttural, I-א, I-י/ו, III-ה, hollow, and geminate roots. Each
  class has characteristic vowel changes or consonant elision in the imperfect
  stem; students learn to identify and explain these alterations against the
  strong-verb baseline from Ch15.
