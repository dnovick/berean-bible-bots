chapter: 12
course: bbh
title: "Introduction to Hebrew Verbs"
focus: >
  Survey the Hebrew verbal system: the binyan (stem) system (Qal through
  Hithpael), the two finite conjugations (perfect and imperfect), mood forms
  (imperative, cohortative, jussive), and the non-finite forms (infinitives
  and participle). Learn the 3ms Qal perfect as the dictionary form and
  understand the root-and-pattern morphology that makes Hebrew verb parsing
  systematic. This chapter provides the conceptual map for every verb chapter
  that follows.
