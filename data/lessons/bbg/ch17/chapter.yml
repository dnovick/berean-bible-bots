chapter: 17
course: bbg
title: "Contract Verbs"
focus: >
  Learn how stems ending in α, ε, or ο contract with the connecting vowel
  to produce the characteristic contracted forms of the present active
  indicative, and memorize the contraction rules for all three classes.
  Recognize contracted forms by their long-vowel or diphthong endings and
  identify the underlying stem vowel. Contract verbs—like ἀγαπάω, ποιέω,
  and πληρόω—are among the most common verbs in the NT.
