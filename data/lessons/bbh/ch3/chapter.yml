chapter: 3
course: bbh
title: "Syllabification and Pronunciation"
focus: >
  Apply the rules for dividing Hebrew words into open and closed syllables,
  identify the tone syllable, and understand how the accent drives vowel
  reduction (pretonic lengthening, propretonic reduction). Mastery of
  syllable structure explains why vowels change in inflected forms throughout
  the noun and verb chapters ahead.
