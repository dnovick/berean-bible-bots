chapter: 17
course: bbh
title: "Waw-Consecutive"
focus: >
  Learn the waw-consecutive with imperfect (wayyiqtol) and with perfect
  (weqatal), including their distinctive pointing and their function of
  sequencing events in Hebrew narrative and discourse. Understand that
  wayyiqtol is the backbone of biblical narrative—it carries past-tense
  sequential action—and that weqatal performs the same sequential role in
  future or instruction contexts.
