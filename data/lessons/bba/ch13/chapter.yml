chapter: 13
course: bba
title: "Peal Perfect"
focus: >
  Learn the Peal perfect paradigm (all 13 PGN forms) with its characteristic
  afformatives and the vowel pattern of the strong verb. Compare the Aramaic
  perfect to the Hebrew Qal perfect (BBH Ch13): the affixes are cognate but
  have Aramaic-specific vowels and spelling conventions. Practice parsing
  PGN from the text of Daniel and Ezra, and understand the perfect's aspectual
  range (completed action, stative).
