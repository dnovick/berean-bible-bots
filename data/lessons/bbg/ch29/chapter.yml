chapter: 29
course: bbg
title: "Adjectival Participles"
focus: >
  Learn the attributive and substantival uses of the participle: in attributive
  position (article + participle modifying a noun) and as a substantive
  (article + participle standing alone as a noun phrase). Practice identifying
  the noun or pronoun being modified and rendering the adjectival participle
  in natural English. Substantival participles (e.g., ὁ πιστεύων = "the one
  who believes") are among the most theologically significant constructions
  in the NT.
