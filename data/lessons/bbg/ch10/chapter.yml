chapter: 10
course: bbg
title: "Third Declension"
focus: >
  Learn the third-declension paradigm for consonant-stem nouns (neuter and
  masculine/feminine), including the characteristic genitive singular endings
  that reveal the lexical stem. Identify the dative plural sigma-stem
  compression and the nominative singular irregularities. Third declension
  nouns are frequent in the NT and essential for reading the Johannine
  Prologue, the Pauline corpus, and Hebrews.
