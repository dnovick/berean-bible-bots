chapter: 8
course: bbh
title: "Hebrew Pronouns"
focus: >
  Memorize the independent personal pronouns (1cs, 2ms/fs, 3ms/fs, and all
  plural forms) and the demonstrative pronouns (near and far, both genders and
  numbers). Learn to distinguish a pronoun used as a subject from one serving
  as a predicate (verbless clause). Pronouns anticipate the pronominal suffix
  paradigms introduced in Ch9.
