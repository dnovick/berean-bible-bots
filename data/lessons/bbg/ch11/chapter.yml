chapter: 11
course: bbg
title: "First and Second Person Personal Pronouns"
focus: >
  Memorize the first-person (ἐγώ) and second-person (σύ) personal pronoun
  paradigms in all four cases, singular and plural. Learn that personal
  pronouns do not have gender in the first and second persons, that the
  nominative forms are emphatic (the verb ending already carries person/number),
  and that oblique forms regularly appear as objects of prepositions and verbs.
