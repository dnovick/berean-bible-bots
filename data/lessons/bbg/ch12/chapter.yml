chapter: 12
course: bbg
title: "αὐτός"
focus: >
  Learn the three uses of αὐτός: (1) as a third-person personal pronoun in
  the oblique cases; (2) as an intensive pronoun in the predicate position
  ("himself/herself/itself"); and (3) as an adjective of identity in
  attributive position ("the same"). Memorize the αὐτός paradigm and
  recognize which use is in view by its syntactic position relative to the
  article.
