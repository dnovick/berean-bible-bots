chapter: 16
course: bba
title: "Peal Infinitive Construct"
focus: >
  Learn the Peal infinitive construct form and its syntactic uses: with the
  preposition לְ to express purpose or complementary infinitive, with
  prepositions to mark temporal relationships, and with pronominal suffixes
  as either its subject or object. Distinguish the infinitive construct from
  the imperative where forms overlap. The Aramaic infinitive construct parallels
  the Hebrew infinitive construct (BBH Ch20) in most of its functions.
