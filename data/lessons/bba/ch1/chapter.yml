chapter: 1
course: bba
title: "Alphabet"
focus: >
  Learn the 22-letter Aramaic alphabet, which shares the same script and
  letter names as Biblical Hebrew but has several distinctive letter forms.
  Identify the five final (sofit) forms, recognize the consonants that
  frequently serve as matres lectionis in Aramaic spelling, and understand
  that right-to-left reading direction and root-and-pattern morphology carry
  over directly from Hebrew to Aramaic.
