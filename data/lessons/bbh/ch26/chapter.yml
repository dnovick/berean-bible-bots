chapter: 26
course: bbh
title: "Hiphil Strong"
focus: >
  Learn the Hiphil stem for strong verbs in all conjugations: perfect,
  imperfect, imperative, infinitives, and participle. Identify the diagnostic
  preformative הִ- in the perfect and infinitive, the מַ- participle preformative,
  and the characteristic hiriq-yod vowel in the imperfect stem. Understand the
  Hiphil's primary function as the causative stem (making someone do an action)
  and its frequent use with intransitive Qal roots to create transitive
  causative meanings.
