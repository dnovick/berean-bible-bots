chapter: 35
course: bbh
title: "Hithpael Weak"
focus: >
  Apply Hithpael stem patterns to weak root classes: II-guttural and II-resh
  (cannot take dagesh forte in the middle consonant), III-ה roots, and roots
  beginning with ת (full assimilation of the הִתְ- ת into the root ת). This
  final chapter of BBH consolidates all seven stems and all major weak classes,
  equipping students to parse any Hebrew verb encountered in continuous
  biblical text.
