chapter: 8
course: bba
title: "Pronominal Suffixes"
focus: >
  Learn the Aramaic pronominal suffix paradigm and attach suffixes to singular
  and plural nouns to express possession and to prepositions as object pronouns.
  Compare the Aramaic suffix set with the Hebrew Type 1 and Type 2 paradigms
  (BBH Ch9); the forms overlap substantially but have Aramaic-specific variants.
  Suffixes also attach to verbs as direct objects (Ch13+), making this one of
  the most productive paradigms in the course.
