chapter: 22
course: bbh
title: "Qal Participle"
focus: >
  Learn the Qal active and passive participle forms in all four
  gender-number combinations, and understand their verbal-nominal dual nature:
  they can head a clause (as a predicate describing ongoing or imminent action)
  or modify a noun (as an attributive or substantival adjective). Recognize
  the diagnostic holem-waw vowel in the active participle and the patah-qamets
  pattern in the passive. Participles are especially frequent in prophetic,
  participial predicates and relative clauses.
