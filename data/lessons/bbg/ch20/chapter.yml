chapter: 20
course: bbg
title: "Verbal Roots (Patterns 2–4)"
focus: >
  Learn the three additional verbal root patterns (Patterns 2–4) in which the
  present tense stem differs from the verbal root: (Pattern 2) a final root
  consonant changes; (Pattern 3) the root has an additional ι or υ in the
  present; (Pattern 4) the root uses a different stem altogether in the
  present. Mastery of these patterns allows students to move from a present
  form to the lexical verbal root needed for lexicon lookup and for forming
  future and aorist stems.
