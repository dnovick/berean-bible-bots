chapter: 16
course: bbg
title: "Present Active Indicative"
focus: >
  Memorize the full present active indicative paradigm (1s–3p) with its
  connecting vowels and primary active endings. Learn the aspect of the
  present tense-form (imperfective aspect: ongoing, progressive, or repeated
  action) and practice parsing person, number, tense-form, voice, and mood
  (PNTVM). First-declension feminine noun paradigms (ὥρα, γραφή) are
  introduced alongside the verbal material.
