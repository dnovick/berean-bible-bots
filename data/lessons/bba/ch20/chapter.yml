chapter: 20
course: bba
title: "The Hithpaal and Ithpaal Stems"
focus: >
  Learn the Hithpaal and Ithpaal stems—the reflexive and passive counterparts
  to the Pael—in all conjugations. Identify the הִתְ-/אִתְ- preformative combined
  with the Pael's characteristic doubling of the middle radical as the compound
  diagnostic. Compare the Hithpaal to the Hebrew Hithpael (BBH Ch34) and note
  the same metathesis rule when the root begins with a sibilant.
