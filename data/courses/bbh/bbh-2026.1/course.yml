id: bbh-2026.1
name: "Biblical Hebrew 1"
textbook: "Basics of Biblical Hebrew"
edition: "3rd"
instructors:
  - "Preston Brown"
  - "David Novick"
description: >
  Introduces the Biblical Hebrew language from the ground up. Students learn
  the Hebrew alphabet (consonants and vowels), core morphology including nouns
  and verbs across the major conjugations, and develop the vocabulary and
  reading skills needed to engage the Old Testament in its original language.
  Primary textbook: *Basics of Biblical Hebrew Grammar* — Pratico & Van Pelt,
  3rd ed. (Zondervan).

