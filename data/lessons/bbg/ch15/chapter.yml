chapter: 15
course: bbg
title: "Introduction to Verbs"
focus: >
  Survey the Greek verbal system: tense-form (present, imperfect, future,
  aorist, perfect, pluperfect), voice (active, middle, passive), mood
  (indicative, subjunctive, optative, imperative), person and number.
  Learn the present active indicative of λύω as the paradigm verb, the
  personal endings, and the connecting (thematic) vowel. This chapter provides
  the conceptual framework for all verb chapters (Chs 16–36).
