chapter: 33
course: bbh
title: "Pual Weak"
focus: >
  Apply Pual stem markers to weak root classes, especially II-guttural and
  II-resh (which cannot accept dagesh forte and require compensatory lengthening
  of the preceding vowel), and III-ה. Because the Pual's qibbuts + dagesh
  forte pattern is normally quite clear, the focus is on correctly handling
  roots that suppress one of those two diagnostics, and on distinguishing Pual
  from a Piel where vowels have reduced.
