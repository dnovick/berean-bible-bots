chapter: 27
course: bbh
title: "Hiphil Weak"
focus: >
  Apply Hiphil stem markers to weak root classes: I-guttural (virtual
  doubling, compensatory lengthening), I-י/ו (preformative merges with
  root-initial yod/waw), III-ה (characteristic endings), hollow (unique
  vowel contraction), and geminate. Recognize that the הִ- preformative
  signals Hiphil even when the root is obscured, and distinguish Hiphil
  from Niphal imperfect in cases with similar preformative patterns.
