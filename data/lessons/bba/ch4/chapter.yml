chapter: 4
course: bba
title: "Nouns: Absolute State"
focus: >
  Learn the masculine and feminine Aramaic noun paradigms in the absolute state
  (the base dictionary form) for singular and plural. Identify the characteristic
  plural endings and recognize the gender markers, noting both similarities to
  and differences from Hebrew noun patterns. The absolute state is the citation
  form and the starting point for the determined (Ch5) and construct (Ch6)
  state paradigms.
