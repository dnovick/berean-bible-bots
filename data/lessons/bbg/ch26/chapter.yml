chapter: 26
course: bbg
title: "Introduction to Participles"
focus: >
  Survey the Greek participle as a verbal adjective: it has tense-form (aspect),
  voice, and can take objects like a verb, but also declines for case, gender,
  and number like an adjective. Learn the morphological key: tense formative +
  participial morpheme (ων/ουσα/ον for present active; μενος/η/ον for
  middle/passive) + adjective endings. Understand the adverbial and adjectival
  uses that will be developed in Chs 27–30.
