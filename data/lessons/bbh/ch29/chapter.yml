chapter: 29
course: bbh
title: "Hophal Weak"
focus: >
  Apply Hophal stem markers to weak root classes: I-guttural, III-ה, hollow,
  and geminate roots. Because Hophal is less frequent than other derived stems,
  the focus is on recognition—identifying the Hophal preformative vowel pattern
  despite root-induced alterations—rather than on production. Students can
  compare Hophal weak forms with the Hiphil weak forms from Ch27 to reinforce
  the active/passive pairing.
