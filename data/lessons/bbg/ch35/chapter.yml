chapter: 35
course: bbg
title: "Nonindicative of δίδωμι and Conditional Sentences"
focus: >
  Learn the non-indicative forms of δίδωμι (subjunctive, imperative,
  infinitive, and participle) alongside the parallel forms of τίθημι
  and ἵστημι for contrast. Study the four classes of Greek conditional
  sentences (simple, future more vivid, present general, contrary to fact)
  and the mood/tense combinations that signal each class. Conditional
  sentences are pervasive in Paul and important for understanding the
  logical structure of NT argumentation.
