chapter: 21
course: bbh
title: "Qal Infinitive Absolute"
focus: >
  Learn the Qal infinitive absolute form and its three primary uses: the
  emphatic cognate accusative construction (intensifying an adjacent finite
  verb of the same root), the resumptive/continuous use, and its occasional
  function as a substitute for an imperative. Distinguish the infinitive
  absolute from the infinitive construct by form and context; both can appear
  in close proximity in the same clause.
