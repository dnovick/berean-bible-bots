chapter: 18
course: bbh
title: "Qal Imperative"
focus: >
  Learn the four Qal imperative forms (2ms, 2fs, 2mp, 2fp) derived from the
  imperfect by removing the preformative and adjusting for initial-consonant
  clusters. Study the cohortative and jussive as first- and third-person
  volitional forms, and learn the negative imperative constructions using
  אַל plus jussive. Volitional mood is central to legal, prophetic, and
  wisdom literature.
