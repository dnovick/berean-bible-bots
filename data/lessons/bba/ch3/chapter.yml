chapter: 3
course: bba
title: "Syllabification"
focus: >
  Apply open-syllable and closed-syllable rules to Aramaic words, identify the
  tone syllable, and understand how the accent drives vowel length and reduction.
  Note that Aramaic syllabification principles are very close to those of Hebrew
  (Ch3 in BBH), so students with Hebrew background can transfer most rules
  directly while attending to a few Aramaic-specific spelling conventions.
