chapter: 7
course: bba
title: "Conjunctions and Prepositions"
focus: >
  Learn the common Aramaic conjunctions (including the ubiquitous ו and the
  subordinating די) and the major prepositions, noting which attach as prefixes
  and which stand independently. Understand that the relative and genitive
  particle דִּי is the most distinctive feature of Aramaic grammar and appears
  hundreds of times in Daniel and Ezra, serving as relative pronoun, subordinator,
  and genitive link.
