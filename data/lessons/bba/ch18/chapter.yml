chapter: 18
course: bba
title: "The Peil, Hithpeel, and Ithpeel Stems"
focus: >
  Learn the three passive/reflexive counterparts to the Peal: the Peil
  (internal passive of Peal, analogous to the Hebrew Niphal or Qal passive),
  the Hithpeel (reflexive, analogous to Hebrew Hithpael), and the Ithpeel
  (an alternative reflexive/passive form). Identify the diagnostic vowel
  patterns and preformatives that distinguish each stem, and understand
  when each is preferred in Daniel and Ezra.
