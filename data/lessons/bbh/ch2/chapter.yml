chapter: 2
course: bbh
title: "Hebrew Vowels"
focus: >
  Learn the full Hebrew vowel system: the seven absolute vowels classified by
  class (a, e, i, o, u) and quantity (long, short, half-long), the reduced
  shewa vowels (vocal and silent shewa, composite shewaim), and the role of
  matres lectionis. Correct vowel reading is the foundation for every parsing
  decision made in subsequent chapters.
