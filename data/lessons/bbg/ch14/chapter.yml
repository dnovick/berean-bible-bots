chapter: 14
course: bbg
title: "Relative Pronoun"
focus: >
  Learn the relative pronoun paradigm (ὅς, ἥ, ὅ), which resembles the article
  but always has a breathing mark and accent. Understand that the relative
  pronoun agrees with its antecedent in gender and number but takes its case
  from its function in the relative clause. Relative clauses are among the
  most common subordinate clause types in the NT and are essential for
  parsing Christological statements in John and Colossians.
