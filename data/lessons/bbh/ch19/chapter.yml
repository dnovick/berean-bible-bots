chapter: 19
course: bbh
title: "Qal Pronominal Suffixes on Verbs"
focus: >
  Learn to attach the object-suffix paradigm to Qal perfect and imperfect
  forms, distinguishing the Type 1 and Type 2 suffix sets and the linking
  vowels used with each. Recognize that a pronominal suffix on a verb is a
  direct object, not a subject. This skill is the verbal counterpart to
  noun suffixes (Ch9) and appears on every page of biblical narrative.
