chapter: 22
course: bbg
title: "Second Aorist Active and Middle Indicative"
focus: >
  Learn the second aorist (strong aorist) active and middle indicative
  paradigms: augment + different (often shorter) aorist stem + connecting
  vowel + secondary endings. Recognize that the second aorist uses the same
  endings as the imperfect but with a different stem, and memorize the most
  common second aorist stems (e.g., εἶπον, ἦλθον, εἶδον). Perfective aspect
  (simple occurrence, summary) is the semantic hallmark of the aorist.
