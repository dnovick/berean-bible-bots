chapter: 19
course: bbg
title: "Future Active and Middle Indicative"
focus: >
  Learn the future active and middle indicative paradigms formed by adding the
  tense formative σ to the verbal stem before the connecting vowel and primary
  endings. Study the consonantal changes that occur when sigma is added to
  stops (labial, velar, dental clusters), and learn the future of εἰμί.
  Understand that the future tense-form carries perfective aspect and
  predictive or deliberative meaning in context.
