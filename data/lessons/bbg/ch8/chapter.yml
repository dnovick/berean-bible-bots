chapter: 8
course: bbg
title: "Prepositions and εἰμί"
focus: >
  Learn the most frequent Greek prepositions and the cases they govern
  (with single, double, or triple case objects), and memorize the present
  indicative paradigm of εἰμί (I am), which is irregular and highly frequent.
  Understand that prepositions refine the meaning of the cases they govern
  and that εἰμί introduces predicate nominative and predicate adjective
  constructions essential for NT theology.
