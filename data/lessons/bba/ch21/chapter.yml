chapter: 21
course: bba
title: "The Haphel Stem"
focus: >
  Learn the Haphel stem paradigms in all conjugations and identify the
  diagnostic הַ- (or אַ-) preformative that marks this causative stem,
  analogous to the Hebrew Hiphil (BBH Ch26). Understand the Haphel's
  causative function and note that in some roots Biblical Aramaic uses the
  Aphel (Ch22) instead of the Haphel; the two are historically related and
  functionally equivalent.
