chapter: 27
course: bbg
title: "Imperfective (Present) Adverbial Participles"
focus: >
  Learn the present active and middle/passive adverbial participle paradigms
  and their primary adverbial uses: temporal ("while"), causal ("because"),
  concessive ("although"), means, and manner. Practice locating the participle's
  referent (same subject as the main verb) and translating with an appropriate
  English subordinate clause. The imperfective participle implies action
  simultaneous or overlapping with the main verb.
