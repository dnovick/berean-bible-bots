chapter: 5
course: bba
title: "Nouns: Determined State"
focus: >
  Learn the Aramaic determined (emphatic) state endings—the functional
  equivalent of the Hebrew definite article—which are suffixed directly to
  the noun rather than prefixed as a separate morpheme. Memorize the determined
  endings for masculine and feminine, singular and plural, and understand that
  in late Biblical Aramaic the determined state often loses its definite force
  and functions simply as the normal nominal form.
