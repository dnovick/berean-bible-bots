chapter: 22
course: bba
title: "The Aphel, Shaphel, and Hophal Stems"
focus: >
  Learn the Aphel (causative with אַ- preformative), the Shaphel (causative
  with שַׁ- preformative, rare in Biblical Aramaic), and the Hophal (passive
  of the Haphel/Aphel) in their major conjugational forms. This final chapter
  completes the Aramaic stem system; students can now identify any verb form
  in Daniel 2–7 and Ezra 4–7 by stem, conjugation, and PGN, and read those
  passages with full morphological analysis.
