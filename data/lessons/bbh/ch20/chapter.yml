chapter: 20
course: bbh
title: "Qal Infinitive Construct"
focus: >
  Learn the Qal infinitive construct form, its use with the prepositions
  לְ and כְּ to express purpose, temporal, or complementary relationships,
  and how it takes pronominal suffixes as either its subject or object.
  Distinguish the infinitive construct from the imperative (identical form
  in most roots) by context and syntactic function. Weak-root variations
  (III-ה, I-י, hollow) are introduced alongside the strong pattern.
