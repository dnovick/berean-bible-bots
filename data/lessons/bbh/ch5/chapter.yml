chapter: 5
course: bbh
title: "Definite Article and Conjunction ו"
focus: >
  Learn the form and function of the Hebrew definite article, its assimilation
  to certain consonants, and its pointing changes before gutturals and resh.
  Master the conjunction ו with its four vowel patterns (waw plus shewa,
  before labials, before yod, and before hateph-patah). Together these two
  particles appear on virtually every page of the Hebrew Bible.
