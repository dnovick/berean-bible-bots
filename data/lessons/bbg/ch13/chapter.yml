chapter: 13
course: bbg
title: "Demonstrative Pronouns/Adjectives"
focus: >
  Learn the near demonstrative οὗτος ("this") and the far demonstrative
  ἐκεῖνος ("that") in all cases, genders, and numbers, noting the irregular
  nominative forms of οὗτος. Distinguish the adjectival use (predicate
  position with the article) from the substantival use, and practice
  identifying antecedents in connected NT text. Demonstratives are especially
  prominent in John's Gospel and the Pauline letters.
