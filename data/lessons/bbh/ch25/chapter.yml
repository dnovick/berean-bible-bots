chapter: 25
course: bbh
title: "Niphal Weak"
focus: >
  Apply the Niphal stem patterns to weak root classes: I-guttural (compensatory
  lengthening instead of dagesh forte), I-נ (double assimilation), III-ה
  (characteristic III-ה endings across all conjugations), hollow, and geminate
  roots. The goal is to recognize a Niphal form even when the diagnostic nun
  is obscured by root behavior, and to distinguish Niphal from Qal in ambiguous
  cases.
