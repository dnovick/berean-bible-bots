chapter: 3
course: bbg
title: "The Alphabet and Pronunciation"
focus: >
  Master all 24 Greek letters in upper and lower case, learn the two
  pronunciation systems (Erasmian and modern Greek), and practice writing
  the alphabet in sequence. Identify vowels, consonants, diphthongs, and
  the breathing-mark system. Accurate letter recognition is the prerequisite
  for every subsequent chapter involving paradigm memorization and text reading.
