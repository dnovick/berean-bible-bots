chapter: 6
course: bbg
title: "Nominative and Accusative; Article"
focus: >
  Learn the second-declension masculine and neuter paradigms in the nominative
  and accusative cases (singular and plural), and the matching forms of the
  definite article. Identify the subject (nominative) and direct object
  (accusative) functions, and use the article to determine case when the noun
  ending alone is ambiguous. The article paradigm is one of the highest-yield
  memorization tasks in the entire course.
