chapter: 11
course: bba
title: "Adverbs and Particles"
focus: >
  Learn the common Aramaic adverbs (temporal, locative, manner) and particles
  including the negatives לָא and אַל, the existential אִיתַי and לֵית, the
  interrogative particle הֲ, and the discourse particle אֱדַיִן ("then, therefore").
  These high-frequency words appear on nearly every page of Daniel and Ezra
  and are essential for parsing clause structure and discourse flow before
  the verbal chapters begin.
