chapter: 30
course: bbh
title: "Piel Strong"
focus: >
  Learn the Piel stem for strong verbs in all conjugations: perfect, imperfect,
  imperative, infinitives, and participle. Identify the diagnostic dagesh forte
  in the middle root consonant as the stem's signature marker, and the
  characteristic patah-tsere vowel sequence in the Piel perfect. Understand the
  Piel's primary functions—intensive or resultative action, and factitive or
  declarative uses—and note its frequent occurrence in Psalms and wisdom
  literature.
