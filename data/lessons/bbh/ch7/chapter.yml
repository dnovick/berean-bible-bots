chapter: 7
course: bbh
title: "Hebrew Adjectives"
focus: >
  Learn the four forms of the Hebrew adjective (masculine/feminine,
  singular/plural) and their attributive, predicative, and substantival uses.
  Practice adjective-noun agreement in gender and number, and recognize when
  the definite article is required on the adjective. The agreement rules
  established here reappear in participial modifiers (Ch22) and relative
  clauses (Ch23).
