chapter: 31
course: bbg
title: "Subjunctive"
focus: >
  Learn the present and aorist subjunctive paradigms (active, middle, and
  passive) characterized by the lengthened connecting vowel (η/ω). Study the
  primary uses of the subjunctive: purpose/result clauses (ἵνα), indefinite
  temporal clauses (ὅταν), conditional sentences (ἐάν), deliberative
  questions, hortatory subjunctive, and prohibitions with μή + aorist
  subjunctive. The subjunctive is the most common non-indicative mood in
  the NT.
