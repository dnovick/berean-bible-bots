chapter: 15
course: bbh
title: "Qal Imperfect Strong Verbs"
focus: >
  Learn all 13 Qal imperfect strong-verb forms with their preformatives and
  afformatives, and the diagnostic holem vowel in the imperfect stem. Contrast
  the imperfect's range of meaning (incomplete action, habitual, modal,
  future) with the perfect from Ch13. Recognize short imperfect (jussive) and
  cohortative forms and begin to use context to disambiguate aspect.
