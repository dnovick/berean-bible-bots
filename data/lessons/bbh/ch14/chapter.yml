chapter: 14
course: bbh
title: "Qal Perfect Weak Verbs"
focus: >
  Apply Qal perfect endings to the major weak-verb classes: I-guttural,
  II-guttural, III-ה, I-נ, geminate, and hollow roots. Learn the compensatory
  lengthening and vowel substitutions gutturals require, the characteristic
  III-ה ה- ending, and how hollow roots contract the middle radical. The
  ability to recognize weak roots within the perfect paradigm established in
  Ch13 is the chief skill goal.
